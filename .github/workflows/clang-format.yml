---
name: Check code style

on:
  pull_request:
    paths:
      - "source/**"
      - ".clang-format"
      - ".github/workflows/clang-format.yml"
  push:
    branches:
      - main
    paths:
      - "source/**"
      - ".clang-format"
      - ".github/workflows/clang-format.yml"
permissions:
  contents: read

concurrency:
  group: clang-format-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Find changed source files
        id: changed-files
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [[ -z "${BASE_SHA}" || "${BASE_SHA}" =~ ^0+$ ]]; then
            BASE_SHA="$(git rev-list --max-parents=0 "${HEAD_SHA}")"
          fi

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            DIFF_RANGE="${BASE_SHA}...${HEAD_SHA}"
          else
            DIFF_RANGE="${BASE_SHA}..${HEAD_SHA}"
          fi

          mapfile -t files < <(
            git diff --name-only --diff-filter=ACMRT "${DIFF_RANGE}" -- source |
              awk '/^source\/.*\.(cpp|hpp|h)$/ && $0 !~ /^source\/ext\//'
          )
          printf 'files=%s\n' "${files[*]}" >> "${GITHUB_OUTPUT}"

      - name: Check clang-format
        if: steps.changed-files.outputs.files != ''
        uses: DoozyX/clang-format-lint-action@v0.20
        with:
          source: ${{ steps.changed-files.outputs.files }}
          extensions: "cpp,hpp,h"
          clangFormatVersion: 16
          inplace: false
