---
name: Windows build and release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build:
    name: Windows ${{ matrix.architecture }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x64
            cmake-architecture: x64
            triplet: x64-windows
            package: NexaMap-Editor-Windows-x64
          - architecture: x86
            cmake-architecture: Win32
            triplet: x86-windows
            package: NexaMap-Editor-Windows-x86
    env:
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Restore vcpkg cache
        uses: actions/cache@v6
        with:
          path: .vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ matrix.triplet }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.triplet }}-

      - name: Prepare vcpkg cache
        shell: pwsh
        run: New-Item -ItemType Directory -Force .vcpkg-cache | Out-Null

      - name: Detect Visual Studio generator
        id: visual-studio
        shell: pwsh
        run: |
          $generatorLine = cmake --help |
            Select-String -Pattern "^\* Visual Studio [0-9]+ [0-9]{4}" |
            Select-Object -First 1

          if (-not $generatorLine) {
            throw "CMake did not report a default Visual Studio generator."
          }

          $generator = [regex]::Match(
            $generatorLine.Line,
            "Visual Studio [0-9]+ [0-9]{4}"
          ).Value
          Write-Host "Using $generator"
          "generator=$generator" >> $env:GITHUB_OUTPUT

      - name: Configure
        shell: pwsh
        run: |
          $toolchain = Join-Path $env:VCPKG_INSTALLATION_ROOT "scripts/buildsystems/vcpkg.cmake"
          cmake -S . -B "out/build/${{ matrix.architecture }}" `
            -G "${{ steps.visual-studio.outputs.generator }}" `
            -A "${{ matrix.cmake-architecture }}" `
            "-DCMAKE_TOOLCHAIN_FILE=$toolchain" `
            "-DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}" `
            -DBUILD_TESTING=ON

      - name: Build Release
        shell: pwsh
        run: cmake --build "out/build/${{ matrix.architecture }}" --config Release --parallel 2

      - name: Run tests
        shell: pwsh
        run: ctest --test-dir "out/build/${{ matrix.architecture }}" -C Release --output-on-failure

      - name: Package Release
        shell: pwsh
        run: |
          $packageName = "${{ matrix.package }}"
          $buildDirectory = "out/build/${{ matrix.architecture }}"
          $runtimeDirectory = Join-Path $buildDirectory "Release"
          $packageDirectory = Join-Path "out/package" $packageName
          $artifactDirectory = "out/artifacts"

          New-Item -ItemType Directory -Force $packageDirectory, $artifactDirectory | Out-Null
          cmake --install $buildDirectory --config Release --prefix $packageDirectory

          Get-ChildItem -LiteralPath $runtimeDirectory -Filter "*.dll" -File |
            Copy-Item -Destination $packageDirectory

          $executable = Join-Path $packageDirectory "NexaMap Editor.exe"
          if (-not (Test-Path -LiteralPath $executable)) {
            throw "Installed executable was not found: $executable"
          }

          $zipPath = Join-Path $artifactDirectory "$packageName.zip"
          Compress-Archive -Path "$packageDirectory/*" -DestinationPath $zipPath -CompressionLevel Optimal

          $hash = Get-FileHash -LiteralPath $zipPath -Algorithm SHA256
          $checksumPath = Join-Path $artifactDirectory "$packageName.sha256"
          "$($hash.Hash.ToLowerInvariant())  $($hash.Path | Split-Path -Leaf)" |
            Set-Content -LiteralPath $checksumPath -Encoding ascii

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.package }}
          path: |
            out/artifacts/${{ matrix.package }}.zip
            out/artifacts/${{ matrix.package }}.sha256
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate version tag
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::Release tags must use vMAJOR.MINOR.PATCH, for example v1.0.0."
            exit 1
          fi

      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          pattern: NexaMap-Editor-Windows-*
          path: dist
          merge-multiple: true

      - name: Verify checksums
        working-directory: dist
        run: sha256sum --check *.sha256

      - name: Publish release
        working-directory: dist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            ./*.zip ./*.sha256 \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --generate-notes \
            --title "NexaMap Editor ${GITHUB_REF_NAME}"
